<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gym Pro System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="center glass fadeIn">
    <h1>🏋️ Gym Pro</h1>
    <select id="role">
        <option value="admin">Admin</option>
        <option value="user">User</option>
    </select>
    <input type="text" id="username" placeholder="Enter Name">
    <button onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden">
    <div class="sidebar glass">
        <h2>Admin</h2>
        <button onclick="show('dashboard')">Dashboard</button>
        <button onclick="show('members')">Members</button>
        <button onclick="show('attendance')">Attendance</button>
        <button onclick="show('fees')">Fees</button>
        <button onclick="show('feedback')">Feedback</button>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="content">

        <div id="dashboard" class="section">
            <h1>Dashboard</h1>
            <div class="cards">
                <div class="card">Members: <span id="total"></span></div>
                <div class="card">Revenue: ₹<span id="revenue"></span></div>
            </div>
        </div>

        <div id="members" class="section hidden">
            <h2>Add Member</h2>
            <input id="name" placeholder="Name">
            <input id="age" placeholder="Age">
            <input id="plan" placeholder="Plan">
            <input id="fee" placeholder="Fee">
            <button onclick="addMember()">Add</button>

            <h3>Member List</h3>
            <ul id="memberList"></ul>
        </div>

        <div id="attendance" class="section hidden">
            <h2>Attendance</h2>
            <ul id="attendanceList"></ul>
        </div>

        <div id="fees" class="section hidden">
            <h2>Fees</h2>
            <ul id="feesList"></ul>
        </div>

        <div id="feedback" class="section hidden">
            <h2>User Feedback</h2>
            <ul id="feedbackList"></ul>
        </div>

    </div>
</div>

<!-- USER PANEL -->
<div id="userPanel" class="hidden center">
    <h1>Welcome <span id="userName"></span></h1>

    <button onclick="userMarkAttendance()">Mark My Attendance</button>

    <h2>Your Attendance</h2>
    <ul id="userAttendance"></ul>

    <h2>Your Fee</h2>
    <p id="userFee"></p>

    <h2>Feedback</h2>
    <input id="feedbackInput" placeholder="Write feedback">
    <button onclick="submitFeedback()">Submit</button>

    <button onclick="logout()">Logout</button>
</div>

<script src="script.js"></script>
</body>
</html>
